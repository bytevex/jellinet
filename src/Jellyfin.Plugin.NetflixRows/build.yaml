name: "Netflix Rows"
guid: "a1b2c3d4-e5f6-4789-a012-b3c4d5e6f7a8"
version: "1.0.0.0"
targetAbi: "10.10.0.0"
framework: "net8.0"
owner: "tywdj123"
overview: "Genereert automatisch Netflix-stijl genre-rijen op de Jellyfin homepage."
description: >
  Voegt automatisch dynamische genre-rijen toe aan de Jellyfin homepage
  (films en/of series), gebaseerd op genre-metadata. Volledig configureerbaar:
  bibliotheken, genres per rij, sorteervolgorde, min/max aantal items en of
  films en series gescheiden worden. Bevat een REST API en een optionele
  web-injectie voor het renderen van de rijen in de Jellyfin web client.
category: "General"
artifacts:
  - "Jellyfin.Plugin.NetflixRows.dll"
changelog: |
  ## 1.0.0.0
  - Eerste release: configureerbare genre-rijen, REST API, web injectie fallback,
    experimentele Home Screen Sections detectie.
