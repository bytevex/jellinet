name: "Netflix Rows"
guid: "a1b2c3d4-e5f6-4789-a012-b3c4d5e6f7a8"
version: "1.0.7.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "bytevex"
overview: "Genereert automatisch Netflix-stijl genre-rijen op de Jellyfin homepage."
description: >
  Voegt automatisch dynamische genre-rijen toe aan de Jellyfin homepage
  (films en/of series), gebaseerd op genre-metadata. Volledig configureerbaar:
  bibliotheken, genres per rij, sorteervolgorde, min/max aantal items en of
  films en series gescheiden worden. Bevat een REST API en een optionele
  web-injectie voor het renderen van de rijen in de Jellyfin web client.
category: "General"
artifacts:
  - "Jellyfin.Plugin.NetflixRows.dll"
changelog: |
  ## 1.0.7.0
  - Fix: rijen verschenen soms dubbel op de homepage door een race condition
    in het web-injectiescript; injectie gebruikt nu een token om verlopen
    resultaten te negeren.
  - Rijen zijn nu horizontaal te scrollen: hover-pijltjes links/rechts en
    muiswiel/trackpad-scroll worden vertaald naar horizontaal scrollen.
  - Meer standaard genre-rijen toegevoegd (Avontuur, Fantasy, Romantiek,
    Animatie, Mysterie, Horror Series, Sci-Fi Series, Familie Series).
  - Nieuwe optie "Standaard secties verbergen": vul de exacte titel van een
    homepage-sectie in (bijv. "Onlangs toegevoegde films") om die te
    verbergen via het web-injectiescript.

  ## 1.0.6.0
  - Fix config page 404 op de controller-import: jellyfin-web bouwt de
    controller-URL als `configurationpage?name=<data-controller>`. Met
    `data-controller="configurationpage?name=NetflixRowsConfigPage.js"`
    ontstond een dubbel-genest pad (`configurationpage?name=configurationpage%3Fname%3D...`)
    dat 404 gaf. data-controller is nu `__plugin/NetflixRowsConfigPage.js`
    (de `__plugin/` prefix wordt door jellyfin-web gestript voordat de
    controller-URL wordt opgebouwd). Ook het overbodige
    `<script src="configurationpage?name=...">`-tag verwijderd, dat als
    klassiek script een syntaxfout gaf op de ES module `export default`.

  ## 1.0.5.0
  - Fix: geïnstalleerde plugin toonde altijd versie 1.0.0.0 omdat de DLL geen
    AssemblyVersion meekreeg. CI stempelt nu -p:Version/-p:AssemblyVersion/
    -p:FileVersion met de tag-versie tijdens dotnet build.

  ## 1.0.4.0
  - Fix config page niet functioneel in Jellyfin 10.11.x: de moderne web-client
    laadt config-page controllers via een ES module dynamic import met een
    `data-controller` attribuut (geen RequireJS `define()` en geen `viewshow`
    event meer). configPage.js omgezet naar `export default class` en
    `data-controller` toegevoegd aan configPage.html.

  ## 1.0.3.0
  - Fix runtime TypeLoadException on Jellyfin 10.11.x: bumped Jellyfin.Controller
    naar 10.11.11 (net9.0), User-entity verplaatst naar
    Jellyfin.Database.Implementations.Entities en SortOrder naar
    Jellyfin.Database.Implementations.Enums.

  ## 1.0.2.0
  - CI: jprm vervangen door directe dotnet build + zip + jq voor het bouwen
    van de release-zip en repository/manifest.json.

  ## 1.0.1.0
  - Fix build: BaseItemKind/ItemSortBy/SortOrder zitten in Jellyfin.Data.Enums,
    ontbrekende using toegevoegd in RowQueryService.

  ## 1.0.0.0
  - Eerste release: configureerbare genre-rijen, REST API, web injectie fallback,
    experimentele Home Screen Sections detectie.
