name: Build and release plugin

# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.1.0
#   git push origin v1.0.1.0
#
# Builds the plugin with `dotnet`, attaches a zip to a GitHub Release, and
# updates repository/manifest.json on the master branch so it can be used
# directly as a Jellyfin plugin repository URL:
#   https://raw.githubusercontent.com/bytevex/jellinet/master/repository/manifest.json
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PLUGIN_GUID: "a1b2c3d4-e5f6-4789-a012-b3c4d5e6f7a8"
  PLUGIN_NAME: "Netflix Rows"
  PLUGIN_DESCRIPTION: "Genereert automatisch Netflix-stijl genre-rijen op de Jellyfin homepage, gebaseerd op genre-metadata uit je bibliotheken."
  PLUGIN_OVERVIEW: "Dynamische genre-rijen (Actie, Komedie, Horror, Sci-Fi, Drama Series, Crime Series, ...) op de homepage."
  PLUGIN_OWNER: "bytevex"
  PLUGIN_CATEGORY: "General"
  PLUGIN_TARGET_ABI: "10.10.0.0"
  PROJECT_PATH: "src/Jellyfin.Plugin.NetflixRows/Jellyfin.Plugin.NetflixRows.csproj"
  PUBLISH_DIR: "src/Jellyfin.Plugin.NetflixRows/bin/Release/net8.0"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: dotnet build "$PROJECT_PATH" -c Release

      - name: Package plugin zip
        id: package
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="netflixrows_${VERSION}.zip"

          mkdir -p artifacts
          (cd "$PUBLISH_DIR" && zip -j "$GITHUB_WORKSPACE/artifacts/$ZIP_NAME" Jellyfin.Plugin.NetflixRows.dll)

          CHECKSUM=$(md5sum "artifacts/$ZIP_NAME" | cut -d' ' -f1)

          echo "name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "path=artifacts/$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: ${{ steps.package.outputs.path }}

      - name: Update repository manifest
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.package.outputs.name }}"
          CHECKSUM="${{ steps.package.outputs.checksum }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq --arg guid "$PLUGIN_GUID" \
             --arg name "$PLUGIN_NAME" \
             --arg description "$PLUGIN_DESCRIPTION" \
             --arg overview "$PLUGIN_OVERVIEW" \
             --arg owner "$PLUGIN_OWNER" \
             --arg category "$PLUGIN_CATEGORY" \
             --arg targetAbi "$PLUGIN_TARGET_ABI" \
             --arg version "$VERSION" \
             --arg sourceUrl "$SOURCE_URL" \
             --arg checksum "$CHECKSUM" \
             --arg timestamp "$TIMESTAMP" \
             --arg changelog "Release $VERSION (tag ${{ github.ref_name }})" \
             '
             (map(.guid) | index($guid)) as $idx
             | (if $idx == null then . + [{
                 guid: $guid,
                 name: $name,
                 description: $description,
                 overview: $overview,
                 owner: $owner,
                 category: $category,
                 imageUrl: "",
                 versions: []
               }] else . end)
             | (map(.guid) | index($guid)) as $idx
             | .[$idx].versions = (
                 [{
                   version: $version,
                   changelog: $changelog,
                   targetAbi: $targetAbi,
                   sourceUrl: $sourceUrl,
                   checksum: $checksum,
                   timestamp: $timestamp
                 }]
                 + (.[$idx].versions | map(select(.version != $version)))
               )
             ' repository/manifest.json > repository/manifest.json.tmp
          mv repository/manifest.json.tmp repository/manifest.json

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repository/manifest.json
          git diff --cached --quiet || git commit -m "Update plugin repository manifest for ${{ github.ref_name }}"
          git push origin master
